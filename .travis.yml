language: python

python:
  - "3.10"
  - "3.11"
  - "3.12"

cache: pip

install:
  - pip install -r requirements.txt

script:
  - black --check src/ tests/
  - flake8 src/ tests/ --max-line-length=100 --extend-ignore=E203,W503
  - pytest tests/ -v --cov=src --cov-report=xml

after_success:
  - bash <(curl -s https://codecov.io/bash)
